<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="../styles.css" />
  <title>Email Doğrulama | MirPDF</title>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="top">
      <div class="brand">
        <div class="logo">PDF</div>
        <div>
          <h1>Email Doğrulama</h1>
          <p>Hesabını doğrula.</p>
        </div>
      </div>
      <div class="actions">
        <a class="ghost" href="../index.html">Ana Sayfa</a>
      </div>
    </header>

    <section class="card">
      <div class="cardHead"><h2>Doğrulama</h2><span class="muted">Linkten gelen token ile doğrular.</span></div><button class="primary full" id="go">Email’i Doğrula</button>
      <div class="small muted" id="msg"></div>
    </section>

    <footer class="muted footer">© 2026 MirPDF</footer>
  </main>

<script>
const qs = new URLSearchParams(location.hash.replace(/^#/, ""));
function setMsg(t){ document.getElementById("msg").textContent = t; }
async function post(url, data){
  const r = await fetch(url,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(data)});
  const j = await r.json().catch(()=>null);
  return {r,j};
}
</script>
<script>

document.getElementById("go").onclick = async ()=>{
  const token = qs.get("token") || "";
  if(!token){ setMsg("Token yok."); return; }
  setMsg("Doğrulanıyor...");
  const {r,j} = await post("/api/auth/verify",{token});
  if(r.ok && j?.ok){ setMsg("✅ Email doğrulandı. Giriş yapabilirsin."); }
  else setMsg("❌ Doğrulama başarısız: " + (j?.error||j?.message||""));
};

</script>
</body>
</html>
