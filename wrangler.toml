pages_build_output_dir = "public"

name = "mirpdf-worker"
main = "_worker.js"
compatibility_date = "2026-02-24"

[[durable_objects.bindings]]
name = "CREDIT_COUNTER"
class_name = "CreditCounter"

[[migrations]]
tag = "v1"
new_classes = ["CreditCounter"]

[[d1_databases]]
binding = "DB"
database_name = "mirpdf-db"
database_id = "bc17d385-2ca6-49fe-9774-51f132982188"  # wrangler d1 create mirpdf-db

[[r2_buckets]]
binding = "PDF_R2"
bucket_name = "mirpdf-files"

# Optional: store deletion/cleanup logs (KVKK compliance / audit)
[[r2_buckets]]
binding = "CLEANUP_LOG_BUCKET"
bucket_name = "mirpdf-cleanup-logs"

# Analytics Engine (Cache hit/miss telemetry)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pdf_platform_ae"

# Queues (Phase 3 backpressure)
[[queues.producers]]
queue = "pdf_jobs"
binding = "JOB_QUEUE"

[[queues.consumers]]
queue = "pdf_jobs"
max_concurrency = 2
max_retries = 3

# KV namespaces
[[kv_namespaces]]
binding = "RATE_KV"
id = "51b9508f38c34b2289344c276c7f0400"  # wrangler kv namespace create RATE_KV

[[kv_namespaces]]
binding = "CACHE_INDEX"
id = "51b9508f38c34b2289344c276c7f0400"  # wrangler kv namespace create CACHE_INDEX

[[kv_namespaces]]
binding = "CIRCUIT_KV"
id = "51b9508f38c34b2289344c276c7f0400"  # wrangler kv namespace create CIRCUIT_KV

[triggers]
crons = ["*/10 * * * *", "0 3 1 * *"]

[vars]
# SEO crawl budget
INDEX_SECONDARY = "0" # 0=noindex secondary tool SEO pages, 1=index all
INTERNAL_LINKS_CRON = "0 3 1 * *"

# Core
APP_ORIGIN = "https://FILL_ACTUAL_DOMAIN"
ALLOWED_ORIGIN = "https://FILL_ACTUAL_PAGES_DOMAIN"
# JWT_SECRET → wrangler secret put JWT_SECRET
JWT_TTL_SECONDS = "86400"
REQUIRE_EMAIL_VERIFIED = "1"
FREE_STARTING_CREDITS = "5"
FREE_DAILY_CREDITS = "5"

# Signed download URLs for job outputs
# DOWNLOAD_SIGNING_SECRET → wrangler secret put DOWNLOAD_SIGNING_SECRET

# Queue mode: set to "on" to enqueue jobs instead of direct dispatch
QUEUE_MODE = "off"

# Circuit breaker + alerts
ALERT_WEBHOOK_URL = ""
ALERT_ERROR_THRESHOLD = "20"

# Email (Resend)
RESEND_API_KEY = ""
EMAIL_FROM = "MirPDF <no-reply@FILL_ACTUAL_DOMAIN>"
EMAIL_VERIFY_TTL_SECONDS = "86400"
RESET_TTL_SECONDS = "3600"

# Rate limits
RL_AUTH_VERIFY_PER_HOUR = "10"
RL_JOB_PER_MINUTE       = "10"   # job submit: IP başına/dk (yoğun trafikte DB'yi korur)
RL_REGISTER_PER_HOUR    = "5"
RL_LOGIN_PER_HOUR        = "20"
RL_UPLOAD_PER_MINUTE    = "12"   # upload: IP başına/dk
RL_POLL_PER_MINUTE      = "60"   # poll/status: IP başına/dk (DB'yi öldürmez)

# Upload limits
WORD_MAX_MB = "25"
OCR_MAX_MB = "25"
MAX_UPLOAD_MB = "50"

# ClientId cookie signing
# CLIENT_ID_SECRET → wrangler secret put CLIENT_ID_SECRET

# Processor
# PROCESSOR_SECRET → wrangler secret put PROCESSOR_SECRET
PROCESSOR_URL = "http://FILL_PROCESSOR_IP:3001"

# Stripe (put real values in Dashboard -> Variables, not in git)
STRIPE_SECRET_KEY = "REPLACE_IN_DASHBOARD"
STRIPE_WEBHOOK_SECRET = "REPLACE_IN_DASHBOARD"
STRIPE_WEBHOOK_TOLERANCE_SECONDS = "300"
STRIPE_PRICE_BASIC = "price_xxx"
STRIPE_PRICE_PRO = "price_xxx"
STRIPE_PRICE_CREDITS100 = "price_xxx"
STRIPE_PRICE_CREDITS500 = "price_xxx"
STRIPE_SUB_PRICE_BASIC = "price_xxx"
STRIPE_SUB_PRICE_PRO = "price_xxx"
SUB_BASIC_MONTHLY_CREDITS = "1000"
SUB_PRO_MONTHLY_CREDITS = "5000"

# Cleanup
JOB_TTL_SECONDS = "3600"
CLEANUP_GRACE_SECONDS = "600"
CLEANUP_BATCH = "50"

# Turnstile (optional)
TURNSTILE_SITE_KEY = ""

# Admin API bearer token (set as secret recommended)
ADMIN_SECRET_TOKEN = ""
